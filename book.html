<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Book a professional consultation with Wilberforce Nsamba - Global Real Estate Visionary." />
    <title>Book a Consultation | Wilberforce Nsamba</title>
    <!-- Tailwind CSS (Play CDN for plain HTML usage) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bgPrimary: '#30314e',
              bgSecondary: '#3b3c5a',
              textPrimary: '#f2f2f2',
              textSecondary: '#a0a0a0',
              accent: '#d4af37',
            },
            fontFamily: {
              sans: ['"Bricolage Grotesque"', 'sans-serif'],
            },
          }
        }
      }
    </script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="bg-bgPrimary text-textPrimary font-sans min-h-screen overflow-x-hidden antialiased md:cursor-none">
    
    <!-- Custom Magnetic Cursor -->
    <div class="custom-cursor" id="custom-cursor"></div>

    <div id="app-content" class="opacity-0">
    <!-- Fixed Navigation -->
    <nav class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-[5%] py-4 md:py-6 pointer-events-auto bg-bgPrimary border-b border-white/10">
      <a href="./index.html" class="relative group hover-trigger block">
        <img src="./images/branding/logo.png" alt="Wilberforce Nsamba Logo" class="h-10 md:h-12 w-auto object-contain transition-transform duration-300 group-hover:scale-105" />
      </a>
      
      <a href="./index.html" class="text-white uppercase tracking-[3px] font-sans text-xs hover-trigger group flex items-center gap-3 border border-white/20 rounded-full px-5 py-2.5 hover:bg-white hover:text-black transition-colors duration-300">
        <span class="group-hover:text-black">Back to Home</span>
      </a>
    </nav>

    <main class="pt-32 pb-20 px-[5%]">
      <div class="w-full max-w-4xl mx-auto">
        <div class="mb-12 text-center">
          <p class="font-sans font-light uppercase tracking-[4px] text-accent mb-4 text-sm md:text-base">Elite Consultation</p>
          <h1 class="font-sans text-5xl md:text-7xl lg:text-8xl mb-6 leading-[1]">Book My Vision.</h1>
          <p class="text-textSecondary text-lg md:text-xl max-w-2xl mx-auto">
            Secure your session for global real estate strategy, property management excellence, or investment advisory.
          </p>
        </div>



        <!-- Glassmorphic Booking Form -->
        <div class="bg-bgSecondary/30 border border-white/10 p-8 md:p-12 relative overflow-hidden group">
          <div class="absolute top-0 left-0 w-1 h-full bg-accent/20 group-hover:bg-accent transition-colors duration-700"></div>
          
          <form class="grid grid-cols-1 md:grid-cols-2 gap-8 relative z-10">
            <div class="flex flex-col gap-2">
              <label class="text-[10px] uppercase tracking-[2px] text-accent font-bold">Full Name</label>
              <input type="text" placeholder="John Doe" class="bg-white/5 border border-white/10 px-4 py-4 focus:border-accent focus:outline-none transition-colors text-white placeholder-white/20 hover-trigger" required />
            </div>
            
            <div class="flex flex-col gap-2">
              <label class="text-[10px] uppercase tracking-[2px] text-accent font-bold">Email Address</label>
              <input type="email" placeholder="john@example.com" class="bg-white/5 border border-white/10 px-4 py-4 focus:border-accent focus:outline-none transition-colors text-white placeholder-white/20 hover-trigger" required />
            </div>

            <div class="flex flex-col gap-2 md:col-span-2">
              <label class="text-[10px] uppercase tracking-[2px] text-accent font-bold">Service Required</label>
              <select class="bg-white/5 border border-white/10 px-4 py-4 focus:border-accent focus:outline-none transition-colors text-white/50 hover-trigger appearance-none" required>
                <option value="" disabled selected>Select a Service</option>
                <option value="consultation">Consultation</option>
                <option value="site-visit">Site Visit</option>
                <option value="advisory">Advisory</option>
                <option value="key-note">Key Note</option>
                <option value="property-marketing">Property Marketing</option>
              </select>
            </div>

            <div class="flex flex-col gap-2">
              <label class="text-[10px] uppercase tracking-[2px] text-accent font-bold">Preferred Date</label>
              <input type="date" class="bg-white/5 border border-white/10 px-4 py-4 focus:border-accent focus:outline-none transition-colors text-white placeholder-white/20 hover-trigger" required />
            </div>

            <div class="flex flex-col gap-2">
              <label class="text-[10px] uppercase tracking-[2px] text-accent font-bold">Company / Organization</label>
              <input type="text" placeholder="Optional" class="bg-white/5 border border-white/10 px-4 py-4 focus:border-accent focus:outline-none transition-colors text-white placeholder-white/20 hover-trigger" />
            </div>

            <div class="flex flex-col gap-2 md:col-span-2">
              <label class="text-[10px] uppercase tracking-[2px] text-accent font-bold">Your Vision / Message</label>
              <textarea rows="4" placeholder="How can I help you navigate the global real estate landscape?" class="bg-white/5 border border-white/10 px-4 py-4 focus:border-accent focus:outline-none transition-colors text-white placeholder-white/20 hover-trigger" required></textarea>
            </div>

            <div class="md:col-span-2 pt-4">
              <button type="submit" class="w-full py-5 bg-accent text-black font-sans uppercase tracking-[3px] text-xs font-bold hover:bg-white transition-colors duration-500 hover-trigger">
                Confirm Booking Request
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <!-- Simple Footer -->
    <footer class="py-10 border-t border-white/10 px-[5%] text-center">
      <p class="text-[10px] uppercase tracking-[4px] text-textSecondary">&copy; 2026 Wilberforce Nsamba. All Rights Reserved.</p>
    </footer>

    </div><!-- End app-content -->

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
